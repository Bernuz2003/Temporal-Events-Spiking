experiment:
  name: smoke_synthetic
  seed: 7
  artifact_root: artifacts
  checkpoint_root: checkpoints
  deterministic: true

dataset:
  name: synthetic_temporal_order
  frames_number: 8
  image_size: 32
  num_classes: 4
  train_samples: 32
  validation_samples: 16
  test_samples: 16
  batch_size: 4
  num_workers: 0
  pin_memory: false

model:
  name: mini_qkformer
  in_channels: 2
  embed_dim: 32
  num_heads: 4
  mlp_ratio: 2.0
  lif_tau: 2.0
  lif_threshold: 1.0

training:
  epochs: 1
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  label_smoothing: 0.0
  gradient_clip_norm: 1.0
  amp: false
  select_metric: macro_f1

profiling:
  enabled: true
  max_batches: 1
  mac_energy_pj: 4.6
  ac_energy_pj: 0.9

audit:
  perturbations:
    - name: original
    - name: reverse_time
    - name: shuffle_time
      seed: 123
    - name: reverse_segments
      segments: 2
      target_mode: keep
  prefix_fractions: [0.25, 0.5, 0.75, 1.0]
  save_predictions: true
