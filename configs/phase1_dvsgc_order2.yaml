experiment:
  name: phase1_dvsgc_order2_miniqkformer
  seed: 42
  artifact_root: artifacts
  checkpoint_root: checkpoints
  deterministic: true

dataset:
  name: dvsgc
  root: data/dvsgc
  frames_number: 16
  split_by: number
  validation_fraction: 0.20
  sequence_length: 2
  primitive_classes: 3
  allow_consecutive_repetition: false
  alpha_min: 0.5
  alpha_max: 0.7
  batch_size: 8
  num_workers: 4
  pin_memory: true
  input_clip: null
  input_scale: none

model:
  name: mini_qkformer
  in_channels: 2
  embed_dim: 128
  num_heads: 8
  mlp_ratio: 2.0
  lif_tau: 2.0
  lif_threshold: 1.0

training:
  epochs: 120
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0005
  label_smoothing: 0.1
  gradient_clip_norm: 1.0
  amp: true
  select_metric: macro_f1

profiling:
  enabled: true
  max_batches: 8
  mac_energy_pj: 4.6
  ac_energy_pj: 0.9

audit:
  perturbations:
    - name: original
    - name: reverse_time
    - name: shuffle_time
      seed: 2026
    - name: reverse_actions
      target_mode: keep
    - name: reverse_actions
      target_mode: reverse_class
  prefix_fractions: [0.25, 0.5, 0.75, 1.0]
  save_predictions: true
