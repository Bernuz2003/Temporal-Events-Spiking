experiment:
  name: phase2_dvsgc_order2_temporal_utilization
  seed: 42
  model_seeds: [42, 123, 2026]
  artifact_root: artifacts
  checkpoint_root: checkpoints
  deterministic: true

dataset:
  name: dvsgc_phase2
  root: data/dvsgc_phase2_order2_v1
  events_root: data/dvsgc/events_np/train
  official_split: train
  frames_number: 16
  primitive_frames: 13
  split_by: number
  primitive_ids: ['1', '3', '8']
  sequence_length: 2
  allow_consecutive_repetition: false
  alpha_min: 0.5
  alpha_max: 0.7
  generation_seed: 123
  height: 128
  width: 128
  batch_size: 8
  num_workers: 4
  pin_memory: true
  input_clip: null
  input_scale: none

split:
  group_by: source_filename
  split_seed: 314159
  train_core: 0.70
  checkpoint_validation: 0.15
  development_audit: 0.15
  forbid_official_test: true

model:
  name: mini_qkformer
  in_channels: 2
  embed_dim: 128
  num_heads: 8
  mlp_ratio: 2.0
  lif_tau: 2.0
  lif_threshold: 1.0

training:
  epochs: 120
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0005
  label_smoothing: 0.1
  gradient_clip_norm: 1.0
  amp: true
  select_metric: macro_f1

phase2:
  protocol_version: phase2_tdup_v1
  prefix:
    auc_start_timestep: 4
    tail_start: 12
  tracing:
    layers: [patch_embed1, stage1, patch_embed2, stage2]
  transformations:
    duration_ratios:
      - [0.40, 0.60]
      - [0.60, 0.40]
  probes:
    layers: [patch_embed1, stage1, patch_embed2, stage2]
    prefix_timesteps: [4, 8, 12, 16]
    regularization_grid: [0.01, 0.1, 1.0]
    epochs: 80
    learning_rate: 0.05
    shuffled_label_control: true
  causal:
    enabled: true
    layers: [patch_embed1, stage1, patch_embed2, stage2]
    regions: [first_action, second_action]
    samples_per_class: 8
  bootstrap:
    samples: 1000
    confidence: 0.95
